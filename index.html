<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>J2ME Vault — Juegos Java Clásicos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0f;
      --bg2:       #0f0f18;
      --panel:     #13131f;
      --border:    #1e1e35;
      --accent:    #00e5ff;
      --accent2:   #ff3c6e;
      --accent3:   #b967ff;
      --text:      #d0d0e8;
      --text-dim:  #606080;
      --text-muted:#3a3a5a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Scanlines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── HEADER ── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem;
      font-weight: 900;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(0,229,255,0.5);
    }
    .logo span { color: var(--accent2); }

    .header-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 2px;
    }

    #user-area {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-left: auto;
    }

    #user-area button {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.35rem 0.7rem;
      border-radius: 2px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    #user-area button:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,255,0.15);
    }

    #user-email {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      border: 1px solid var(--border);
      padding: 0.35rem 0.6rem;
      border-radius: 2px;
      max-width: 170px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 700px) {
      header {
        padding: 0 0.8rem;
        gap: 0.5rem;
      }

      .logo {
        font-size: 1rem;
        letter-spacing: 1px;
      }

      .header-badge {
        font-size: 0.55rem;
        padding: 3px 6px;
      }

      #user-area {
        gap: 0.25rem;
      }

      #user-area button,
      #user-email {
        font-size: 0.58rem;
        padding: 0.28rem 0.45rem;
      }

      #user-email {
        max-width: 95px;
      }
    }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(135deg, var(--bg2) 0%, #0d0d20 50%, var(--bg) 100%);
      padding: 3rem 2rem 2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent3), var(--accent2), transparent);
    }
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .hero h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: 4px;
      line-height: 1.1;
      position: relative;
    }
    .hero h1 .l1 { color: var(--text); }
    .hero h1 .l2 { color: var(--accent); text-shadow: 0 0 30px rgba(0,229,255,0.6); }
    .hero p {
      color: var(--text-dim);
      margin-top: 0.8rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      position: relative;
    }

    /* ── LAYOUT ── */
    .main-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.5rem 0;
      position: sticky;
      top: 64px;
      height: calc(100vh - 64px);
      overflow-y: auto;
    }
    .sidebar-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.62rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      padding: 0 1.2rem 0.8rem;
    }
    .cat-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.6rem 1.2rem;
      background: none;
      border: none;
      border-left: 2px solid transparent;
      color: var(--text-dim);
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }
    .cat-btn:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .cat-btn.active { color: var(--accent); border-left-color: var(--accent); background: rgba(0,229,255,0.05); }
    .cat-count {
      margin-left: auto;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--border);
      padding: 1px 6px;
      border-radius: 2px;
    }
    .sidebar-divider { height: 1px; background: var(--border); margin: 0.8rem 1.2rem; }
    .sidebar-total {
      padding: 0.3rem 1.2rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent);
    }

    /* ── CATALOG ── */
    .catalog { padding: 1.5rem; }
    .catalog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .catalog-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 3px;
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.4rem 0.8rem;
    }
    .search-bar input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      width: 180px;
    }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-icon { color: var(--text-muted); }

    /* ── GAME GRID ── */
    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 1rem;
    }
    .game-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      animation: fadeUp 0.3s ease both;
    }
    .game-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0,229,255,0.1);
    }
    .game-card:hover .card-overlay { opacity: 1; }
    .card-img-wrap { position: relative; }
    .card-thumb {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: var(--bg2);
    }
    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,229,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: 0.2s;
    }
    .play-icon {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      color: var(--bg);
      font-size: 1rem;
      font-weight: bold;
    }
    .card-info { padding: 0.6rem 0.7rem; }
    .card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-dev {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
      margin-top: 2px;
    }
    .card-cat {
      display: inline-block;
      margin-top: 5px;
      font-size: 0.62rem;
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent2);
      border: 1px solid rgba(255,60,110,0.3);
      padding: 1px 6px;
      border-radius: 2px;
    }
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem;
      color: var(--text-muted);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      background: var(--bg2);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
    }
    footer span { color: var(--accent2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 700px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar {
        position: static; height: auto;
        display: flex; flex-wrap: wrap;
        padding: 0.8rem; gap: 0.3rem;
      }
      .sidebar-label, .sidebar-divider, .sidebar-total { display: none; }
      .cat-btn {
        width: auto; border: 1px solid var(--border);
        border-left: 2px solid transparent;
        border-radius: 3px; padding: 0.3rem 0.8rem; font-size: 0.8rem;
      }
      .cat-btn.active { border-color: var(--accent); }
    }

    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── TOASTS ── */
    #toast-container {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .toast {
      min-width: 220px;
      max-width: 300px;
      background: rgba(19, 19, 31, 0.96);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 0.9rem;
      border-radius: 3px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      box-shadow: 0 0 18px rgba(0,0,0,0.35);
      opacity: 0;
      transform: translateY(-8px);
      animation: toastIn 0.22s ease forwards;
    }

    .toast.success {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 0 18px rgba(0,229,255,0.16);
    }

    .toast.error {
      border-color: var(--accent2);
      color: #ff8aa8;
      box-shadow: 0 0 18px rgba(255,60,110,0.16);
    }

    .toast.info {
      border-color: var(--accent3);
      color: #d7b6ff;
      box-shadow: 0 0 18px rgba(185,103,255,0.16);
    }

    .toast-hide {
      animation: toastOut 0.22s ease forwards;
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0);
      }
      to {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    @media (max-width: 700px) {
      #toast-container {
        top: 72px;
        right: 10px;
        left: 10px;
      }

      .toast {
        max-width: 100%;
        min-width: 0;
        font-size: 0.66rem;
      }
    }

    /* ── AUTH MODAL ── */
    .auth-modal {
      position: fixed;
      inset: 0;
      z-index: 4000;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .auth-box {
      width: 100%;
      max-width: 420px;
      background: rgba(19, 19, 31, 0.98);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.2rem;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.45);
    }

    .auth-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem;
      color: var(--accent);
      letter-spacing: 2px;
      text-shadow: 0 0 14px rgba(0,229,255,0.28);
    }

    .auth-subtitle {
      margin-top: 0.35rem;
      margin-bottom: 1rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-dim);
      letter-spacing: 2px;
    }

    .auth-label {
      display: block;
      margin-bottom: 0.4rem;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text);
    }

    .auth-input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.75rem 0.8rem;
      margin-bottom: 0.9rem;
      border-radius: 2px;
      outline: none;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
    }

    .auth-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0,229,255,0.12);
    }

    .auth-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.6rem;
      margin-top: 0.4rem;
    }

    .auth-btn {
      border-radius: 2px;
      padding: 0.6rem 1rem;
      cursor: pointer;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      transition: all 0.15s ease;
    }

    .auth-btn-secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .auth-btn-secondary:hover {
      border-color: var(--text-dim);
      color: var(--text);
    }

    .auth-btn-primary {
      background: var(--accent);
      color: var(--bg);
      border: 1px solid var(--accent);
      box-shadow: 0 0 16px rgba(0,229,255,0.14);
    }

    .auth-btn-primary:hover {
      background: #33eeff;
    }

    @media (max-width: 700px) {
      .auth-box {
        max-width: 100%;
        padding: 1rem;
      }

      .auth-title {
        font-size: 1rem;
      }

      .auth-input {
        font-size: 0.72rem;
      }

      .auth-btn {
        font-size: 0.66rem;
        padding: 0.58rem 0.85rem;
      }
    }
  </style>
</head>
<body>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://hwhmhtubmbhnrugofqvf.supabase.co"
const supabaseKey = "sb_publishable_tCLHHRkI3twgINafbj-q-A_EVDvwn-Y"

const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey)

console.log("Supabase conectado:", supabaseClient);
</script>
  
<header>
  
  <a class="logo" href="index.html">J2ME<span>VAULT</span></a>
  <div class="header-badge">PRESERVACIÓN // JAVA ME</div>
  
  <div id="user-area">
    <button id="login-btn">Login</button>
    <button id="register-btn">Register</button>
    <button id="logout-btn" style="display:none;">Logout</button>
    <span id="user-email" style="display:none;"></span>
  </div>
  
</header>

<div id="auth-modal" class="auth-modal" style="display:none;">
  <div class="auth-box">
    <div class="auth-title">J2MEVAULT</div>
    <div class="auth-subtitle" id="auth-mode-title">LOGIN</div>

    <label class="auth-label" for="auth-email">Email</label>
    <input id="auth-email" class="auth-input" type="email" autocomplete="email">

    <label class="auth-label" for="auth-password">Password</label>
    <input id="auth-password" class="auth-input" type="password" autocomplete="current-password">

    <div class="auth-actions">
      <button id="auth-cancel" class="auth-btn auth-btn-secondary" type="button">CANCELAR</button>
      <button id="auth-submit" class="auth-btn auth-btn-primary" type="button">LOGIN</button>
    </div>
  </div>
</div>

<script>
const loginBtn = document.getElementById("login-btn");
const registerBtn = document.getElementById("register-btn");
const logoutBtn = document.getElementById("logout-btn");
const userEmail = document.getElementById("user-email");

const authModal = document.getElementById("auth-modal");
const authModeTitle = document.getElementById("auth-mode-title");
const authEmail = document.getElementById("auth-email");
const authPassword = document.getElementById("auth-password");
const authCancel = document.getElementById("auth-cancel");
const authSubmit = document.getElementById("auth-submit");

let authMode = "login";

function showToast(message, type = "info") {
  const container = document.getElementById("toast-container");
  if (!container) return;

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.textContent = message;

  container.appendChild(toast);

  setTimeout(() => {
    toast.classList.add("toast-hide");
    setTimeout(() => {
      toast.remove();
    }, 220);
  }, 2600);
}

function updateAuthUI(session) {
  if (session && session.user) {
    loginBtn.style.display = "none";
    registerBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    userEmail.style.display = "inline-block";

    if (window.innerWidth < 700) {
      userEmail.textContent = "USER";
    } else {
      userEmail.textContent = session.user.email;
    }
    
  } else {
    loginBtn.style.display = "inline-block";
    registerBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    userEmail.style.display = "none";
    userEmail.textContent = "";
  }
}

function openAuthModal(mode) {
  authMode = mode;

  if (mode === "login") {
    authModeTitle.textContent = "LOGIN";
    authSubmit.textContent = "LOGIN";
    authPassword.autocomplete = "current-password";
  } else {
    authModeTitle.textContent = "REGISTER";
    authSubmit.textContent = "REGISTER";
    authPassword.autocomplete = "new-password";
  }

  authEmail.value = "";
  authPassword.value = "";
  authModal.style.display = "flex";

  setTimeout(() => authEmail.focus(), 50);
}

function closeAuthModal() {
  authModal.style.display = "none";
  authEmail.value = "";
  authPassword.value = "";
}

authCancel.onclick = () => {
  closeAuthModal();
};

authModal.onclick = (e) => {
  if (e.target === authModal) {
    closeAuthModal();
  }
};

document.addEventListener("keydown", (e) => {
  if (e.key === "Escape" && authModal.style.display === "flex") {
    closeAuthModal();
  }
});

loginBtn.onclick = () => {
  openAuthModal("login");
};

registerBtn.onclick = () => {
  openAuthModal("register");
};

authSubmit.onclick = async () => {
  try {
    const email = authEmail.value.trim();
    const password = authPassword.value;

    if (!email || !password) {
      showToast("Completa email y password", "error");
      return;
    }

    if (authMode === "login") {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        showToast("Login error: " + error.message, "error");
        console.error("Login error:", error);
        return;
      }

      closeAuthModal();
      showToast("Bienvenido", "success");
      console.log("Login correcto:", data);
      updateAuthUI(data.session);
      return;
    }

    const { data, error } = await supabaseClient.auth.signUp({
      email,
      password
    });

    if (error) {
      showToast("Register error: " + error.message, "erro
